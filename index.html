<!DOCTYPE html>
<html lang="zh">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
  <title>生日快乐</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      background: #020210;
      overflow: hidden;
      font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
    }

    canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }

    #stars {
      z-index: 1
    }

    #fireworks {
      z-index: 2
    }

    #particles {
      z-index: 3
    }

    #startBtn {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      padding: 18px 40px;
      font-size: 24px;
      color: white;
      border-radius: 50px;
      border: 2px solid rgba(255, 255, 255, 0.6);
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
      cursor: pointer;
      z-index: 10;
    }

    #cake {
      position: absolute;
      bottom: 6%;
      left: 50%;
      transform: translateX(-50%);
      font-size: 70px;
      opacity: 0;
      transition: 2s;
      z-index: 10;
      text-align: center;
      color: white;
      /* text-shadow: 0 0 20px #66ccff, 0 0 40px #66ccff, 0 0 60px #66ccff; */
    }
  </style>
</head>

<body>
  <canvas id="stars"></canvas>
  <canvas id="fireworks"></canvas>
  <canvas id="particles"></canvas>
  <div id="cake">🎁</div>
  <button id="startBtn">点击开启生日惊喜</button>
  <audio id="music" loop preload="auto">
    <source src="wangl.mp3" type="audio/mpeg">
  </audio>

  <script>
    const lines = [
      "祝你生日快乐",
      "四川第一温柔",
      "美少女",
      "愿所有幸运",
      "围绕你",
      "愿所有愿望",
      "都实现",
      "愿未来的你",
      "闪闪发光",
      "谢谢你",
      "路过我的世界",
      "希望你",
      "一直快乐",
      "下面是为你",
      "准备的礼物",
      "点开看看吧"
    ];

    const starsCanvas = document.getElementById("stars");
    const fireCanvas = document.getElementById("fireworks");
    const particleCanvas = document.getElementById("particles");
    const starCtx = starsCanvas.getContext("2d");
    const fireCtx = fireCanvas.getContext("2d");
    const particleCtx = particleCanvas.getContext("2d");
    const btn = document.getElementById("startBtn");
    const cake = document.getElementById("cake");
    const music = document.getElementById("music");

    let w, h, dpr = window.devicePixelRatio || 1;

    function resize() {
      w = window.innerWidth; h = window.innerHeight;
      [starsCanvas, fireCanvas, particleCanvas].forEach(c => {
        c.width = w * dpr; c.height = h * dpr; c.style.width = w + "px"; c.style.height = h + "px";
      });
      starCtx.setTransform(dpr, 0, 0, dpr, 0, 0);
      fireCtx.setTransform(dpr, 0, 0, dpr, 0, 0);
      particleCtx.setTransform(dpr, 0, 0, dpr, 0, 0);
    }
    resize(); window.addEventListener("resize", resize);

    /* 星空 */
    let starList = [];
    for (let i = 0; i < 120; i++) { starList.push({ x: Math.random() * w, y: Math.random() * h, size: Math.random() * 2, speed: Math.random() * 0.3 }) }
    /* 流星 */
    let meteors = [];

    class Meteor {
      constructor() {
        this.reset();
      }

      reset() {

        /* 从屏幕外左上角生成 */
        this.x = -100 - Math.random() * 200
        this.y = Math.random() * h * 0.4

        this.len = 60 + Math.random() * 20
        this.speed = 5 + Math.random() * 2
        this.size = 1.2

        this.angle = Math.PI / 4
        this.active = true

      }

      update() {
        this.x += this.speed * Math.cos(this.angle);
        this.y += this.speed * Math.sin(this.angle);

        if (this.x > w + 100 || this.y > h + 100) {
          this.active = false;
        }
      }

      draw() {
        let tailX = this.x - Math.cos(this.angle) * this.len;
        let tailY = this.y - Math.sin(this.angle) * this.len;

        let gradient = starCtx.createLinearGradient(
          this.x,
          this.y,
          tailX,
          tailY
        );

        gradient.addColorStop(0, "rgba(255,255,255,1)");
        gradient.addColorStop(1, "rgba(255,255,255,0)");

        starCtx.beginPath();
        starCtx.moveTo(this.x, this.y);
        starCtx.lineTo(tailX, tailY);
        starCtx.lineWidth = this.size;
        starCtx.strokeStyle = gradient;
        starCtx.stroke();
      }
    }
    /* 烟花 */
    class Firework {
      constructor(x) {
        this.x = x; this.y = h; this.vy = -7 - Math.random() * 2; this.hue = Math.random() * 360; this.exploded = false; this.particles = [];
      }
      update() {
        if (!this.exploded) { this.y += this.vy; this.vy += 0.05; if (this.vy >= 0) { this.explode(); } }
        else { this.particles.forEach(p => { p.x += p.vx; p.y += p.vy; p.vy += 0.05; p.life-- }); this.particles = this.particles.filter(p => p.life > 0); }
      }
      explode() { this.exploded = true; for (let i = 0; i < 28; i++) { const a = Math.random() * Math.PI * 2, s = Math.random() * 2.5; this.particles.push({ x: this.x, y: this.y, vx: Math.cos(a) * s, vy: Math.sin(a) * s, life: 80 }) } }
      draw() {
        if (!this.exploded) {
          const tailX = this.x
          const tailY = this.y + 30

          const gradient = fireCtx.createLinearGradient(
            this.x,
            this.y,
            tailX,
            tailY
          )

          gradient.addColorStop(0, `hsl(${this.hue},100%,70%)`)
          gradient.addColorStop(1, "rgba(255,255,255,0)")

          fireCtx.beginPath()
          fireCtx.moveTo(this.x, this.y)
          fireCtx.lineTo(tailX, tailY)

          fireCtx.strokeStyle = gradient
          fireCtx.lineWidth = 2
          fireCtx.stroke()
        }
        else {
          this.particles.forEach(p => {

            const tailX = p.x - p.vx * 5
            const tailY = p.y - p.vy * 5

            const gradient = fireCtx.createLinearGradient(
              p.x,
              p.y,
              tailX,
              tailY
            )

            gradient.addColorStop(0, `hsl(${this.hue},100%,70%)`)
            gradient.addColorStop(1, "rgba(255,255,255,0)")

            fireCtx.beginPath()
            fireCtx.moveTo(p.x, p.y)
            fireCtx.lineTo(tailX, tailY)

            fireCtx.strokeStyle = gradient
            fireCtx.lineWidth = 2
            fireCtx.stroke()

          });
        }
      }
    }

    let fireworkList = [];
    setInterval(() => {
      if (Math.random() < 0.6) {
        fireworkList.push(new Firework(Math.random() * w))
      }
    }, 2000);
    /* 粒子文字 */
    let particles = [], currentLine = 0;
    class Particle {
      constructor(x, y) { this.x = Math.random() * w; this.y = Math.random() * h; this.tx = x; this.ty = y; this.vx = 0; this.vy = 0; }
      // update() { this.vx += (this.tx - this.x) * 0.1; this.vy += (this.ty - this.y) * 0.1; this.x += this.vx; this.y += this.vy; this.vx *= 0.85; this.vy *= 0.85; }
      update() {

        this.vx += (this.tx - this.x) * 0.04
        this.vy += (this.ty - this.y) * 0.04

        this.x += this.vx
        this.y += this.vy

        this.vx *= 0.92
        this.vy *= 0.92

      }
      draw() { particleCtx.shadowColor = "#66ccff"; particleCtx.shadowBlur = 4; particleCtx.fillStyle = "#66ccff"; particleCtx.fillRect(this.x, this.y, 3, 3); particleCtx.shadowBlur = 0; }
      scatter() { this.x += Math.random() * 50 - 25; this.y += Math.random() * 50 - 25; }
    }
    function generateLineParticles(text) {
      particles = [];
      const temp = document.createElement("canvas"); const tctx = temp.getContext("2d");
      temp.width = w; temp.height = h; tctx.fillStyle = "white";
      let fontSize = Math.min(w / 8, 70);
      tctx.font = `bold ${fontSize}px PingFang SC`; tctx.textAlign = "center"; tctx.textBaseline = "middle";
      tctx.fillText(text, w / 2, h / 2);
      const data = tctx.getImageData(0, 0, w, h).data;
      let step = w < 400 ? 3 : 5;
      for (let y = 0; y < h; y += step) { for (let x = 0; x < w; x += step) { let i = (y * w + x) * 4; if (data[i + 3] > 128) { particles.push(new Particle(x, y)) } } }
    }
    function nextLine() {
      if (currentLine >= lines.length) { cake.style.opacity = 1; return; }
      generateLineParticles(lines[currentLine]); currentLine++; setTimeout(nextLine, 3800);
    }

    /* 触屏互动 */
    particleCanvas.addEventListener("click", () => { particles.forEach(p => p.scatter()); });

    /* 动画 */
    function animate() {
      starCtx.fillStyle = "#020210"; starCtx.fillRect(0, 0, w, h);
      starList.forEach(s => { s.y += s.speed; if (s.y > h) s.y = 0; starCtx.beginPath(); starCtx.arc(s.x, s.y, s.size, 0, Math.PI * 2); starCtx.fillStyle = "white"; starCtx.fill(); });
      /* 随机生成流星 */
      if (Math.random() < 0.003) {
        meteors.push(new Meteor());
      }

      /* 更新流星 */
      meteors.forEach(m => {
        m.update();
        m.draw();
      });

      meteors = meteors.filter(m => m.active);
      fireCtx.clearRect(0, 0, w, h); fireworkList.forEach(f => { f.update(); f.draw(); });
      particleCtx.clearRect(0, 0, w, h); particles.forEach(p => { p.update(); p.draw(); });
      requestAnimationFrame(animate);
    }
    animate();

    /* start */
    btn.onclick = function () {
      btn.style.display = "none";
      music.muted = true; music.play(); setTimeout(() => { music.muted = false; }, 200);
      nextLine();
    }
  </script>
</body>

</html>
