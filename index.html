<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>生日快乐，何敏！</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(145deg, #0b0b2b 0%, #1a1a3a 100%);
      font-family: 'Arial', sans-serif;
      overflow: hidden;
      position: relative;
    }

    #particle-canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: block;
      z-index: 1;
    }

    #fireworks-canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: block;
      z-index: 2;
      pointer-events: none;
    }

    #start-btn {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      padding: 20px 40px;
      font-size: 28px;
      font-weight: bold;
      color: white;
      background: rgba(255, 255, 255, 0.15);
      border: 2px solid rgba(255, 255, 255, 0.5);
      border-radius: 60px;
      backdrop-filter: blur(5px);
      cursor: pointer;
      z-index: 10;
      transition: all 0.3s;
      box-shadow: 0 0 30px rgba(255, 255, 255, 0.2);
      letter-spacing: 2px;
      font-family: 'Dancing Script', cursive;
      white-space: nowrap;
    }

    #start-btn:hover {
      background: rgba(255, 255, 255, 0.3);
      box-shadow: 0 0 50px rgba(255, 255, 255, 0.4);
      border-color: white;
      transform: translate(-50%, -50%) scale(1.05);
    }

    @media (max-width: 600px) {
      #start-btn {
        font-size: 20px;
        padding: 15px 30px;
      }
    }

    .hidden {
      display: none !important;
    }

    @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&display=swap');
  </style>
</head>

<body>
  <canvas id="particle-canvas"></canvas>
  <canvas id="fireworks-canvas"></canvas>
  <button id="start-btn" class="✨ 点击开启惊喜 ✨">✨ 点击开启惊喜 ✨</button>

  <audio id="bg-music" loop preload="auto">
    <source src="./wangl.mp3" type="audio/mpeg">
  </audio>

  <script>
    (function () {
      // ---------- 祝福语内容（可自由换行）----------
      const TEXT_LINES = [
        "那就先祝你生日快乐吧",
        "四川第一温柔美少女！",
        "愿你每一天都如今天般灿烂",
        "感谢你出现在我的生命里",
      ];

      // ---------- 粒子参数 ----------
      const PARTICLE_SPEED = 0.03;            // 移动速度
      const MOVE_THRESHOLD = 0.5;              // 到达目标点的距离阈值
      const TAIL_LENGTH = 3;                    // 拖尾长度
      const LINE_COMPLETE_DELAY = 2000;          // 行完成后到下一行的延迟（毫秒）

      // ---------- 烟花参数 ----------
      const FIREWORK_INTERVAL = 400;            // 发射间隔（毫秒）
      const FIREWORK_GRAVITY = 0.08;             // 重力
      const FIREWORK_SPEED = 5;                  // 上升速度基础值
      const PARTICLE_COUNT = 100;                 // 每个烟花的爆炸粒子数
      const FIREWORK_TAIL_LENGTH = 5;             // 爆炸粒子拖尾长度

      // ---------- 全局变量 ----------
      let width, height;
      let fontSize, lineHeight, font;
      let particles = [];                        // 当前行的粒子数组
      let currentLinePoints = [];                 // 当前行的目标点阵
      let currentLineIndex = 0;                    // 当前正在显示的行索引 (0开始)
      let animationFrame;
      let isMoving = false;                        // 粒子是否正在移动
      let lineCompleteTimer = null;                 // 行完成后的延迟定时器
      let allParticlesArrived = false;              // 当前行是否全部到达
      let fireworksStarted = false;                  // 烟花是否已启动
      let fireworks = [];                            // 烟花对象数组
      let fireworkTimer = null;                      // 烟花发射定时器

      // 动态目标粒子数（根据屏幕宽度调整）
      let targetParticleCount;

      const particleCanvas = document.getElementById('particle-canvas');
      const particleCtx = particleCanvas.getContext('2d');
      const fireworkCanvas = document.getElementById('fireworks-canvas');
      const fireworkCtx = fireworkCanvas.getContext('2d');
      const startBtn = document.getElementById('start-btn');
      const music = document.getElementById('bg-music');

      // ---------- 根据屏幕宽度计算目标粒子数 ----------
      function calcTargetParticleCount() {
        const baseWidth = 375;
        const baseCount = 300;
        const scale = width / baseWidth;
        let count = Math.floor(baseCount * scale);
        count = Math.min(1500, Math.max(800, count));
        return count;
      }

      // ---------- 更新尺寸相关变量（字体调小版）----------
      function updateSizing() {
        width = window.innerWidth;
        height = window.innerHeight;
        particleCanvas.width = width;
        particleCanvas.height = height;
        fireworkCanvas.width = width;
        fireworkCanvas.height = height;

        // 字体调小：小屏手机 width/12，大屏手机 width/10，最大不超过60px
        if (width < 400) {
          fontSize = Math.min(40, Math.max(24, Math.floor(width / 12)));
        } else {
          fontSize = Math.min(60, Math.max(32, Math.floor(width / 10)));
        }
        lineHeight = fontSize * 1.3;
        font = `bold ${fontSize}px "Dancing Script", cursive`;

        targetParticleCount = calcTargetParticleCount();
      }
      updateSizing();

      let resizeTimer;
      window.addEventListener('resize', () => {
        if (isMoving || fireworksStarted) return;
        clearTimeout(resizeTimer);
        resizeTimer = setTimeout(() => {
          updateSizing();
        }, 200);
      });

      // ---------- 生成单行文字的点阵 ----------
      function generatePointsForLine(lineText, targetCount) {
        const offCanvas = document.createElement('canvas');
        const offCtx = offCanvas.getContext('2d');
        offCanvas.width = width;
        offCanvas.height = height;

        offCtx.clearRect(0, 0, width, height);
        offCtx.font = font;
        offCtx.fillStyle = '#ffffff';
        offCtx.textAlign = 'center';
        offCtx.textBaseline = 'middle';

        const totalHeight = TEXT_LINES.length * lineHeight;
        const startY = (height - totalHeight) / 2 + lineHeight / 2;
        const lineY = startY + currentLineIndex * lineHeight;

        offCtx.fillText(lineText, width / 2, lineY);

        const imageData = offCtx.getImageData(0, 0, width, height);
        const data = imageData.data;
        let totalLit = 0;
        for (let y = 0; y < height; y++) {
          for (let x = 0; x < width; x++) {
            const idx = (y * width + x) * 4;
            if (data[idx] > 200) totalLit++;
          }
        }

        let step = 1;
        if (totalLit > targetCount) {
          step = Math.max(1, Math.floor(Math.sqrt(totalLit / targetCount)));
        }
        step = Math.min(15, step);

        const points = [];
        for (let y = 0; y < height; y += step) {
          for (let x = 0; x < width; x += step) {
            const idx = (y * width + x) * 4;
            if (data[idx] > 200) {
              points.push({ x, y });
            }
          }
        }
        console.log(`第 ${currentLineIndex + 1} 行粒子数: ${points.length} (目标 ${targetCount}, 步长 ${step})`);
        return points;
      }

      // ---------- 粒子类（用于拼字）----------
      class Particle {
        constructor(x, y, targetX, targetY) {
          this.x = x;
          this.y = y;
          this.targetX = targetX;
          this.targetY = targetY;
          this.vx = 0;
          this.vy = 0;
          this.size = Math.random() * 3 + 2;
          this.opacity = Math.random() * 0.7 + 0.3;
          this.history = [];
        }

        update() {
          if (!isMoving) return;

          const dx = this.targetX - this.x;
          const dy = this.targetY - this.y;
          const dist = Math.sqrt(dx * dx + dy * dy);
          if (dist > MOVE_THRESHOLD) {
            this.vx = dx * PARTICLE_SPEED;
            this.vy = dy * PARTICLE_SPEED;
            this.x += this.vx;
            this.y += this.vy;
          } else {
            this.x = this.targetX;
            this.y = this.targetY;
            this.vx = 0;
            this.vy = 0;
          }

          this.history.push({ x: this.x, y: this.y });
          if (this.history.length > TAIL_LENGTH) this.history.shift();
        }

        draw() {
          for (let i = 0; i < this.history.length; i++) {
            const point = this.history[i];
            const t = i / this.history.length;
            const size = this.size * t * 0.8;
            const opacity = this.opacity * t * 0.6;
            particleCtx.beginPath();
            particleCtx.arc(point.x, point.y, size, 0, Math.PI * 2);
            particleCtx.fillStyle = `rgba(255, 255, 255, ${opacity})`;
            particleCtx.fill();
          }

          particleCtx.beginPath();
          particleCtx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
          particleCtx.fillStyle = `rgba(255, 255, 255, ${this.opacity})`;
          particleCtx.fill();
        }
      }

      // ---------- 烟花相关类 ----------
      class FireworkParticle {
        constructor(x, y, vx, vy, hue, size, life) {
          this.x = x;
          this.y = y;
          this.vx = vx;
          this.vy = vy;
          this.hue = hue;
          this.size = size;
          this.life = life;
          this.maxLife = life;
          this.history = [];
        }

        update() {
          this.x += this.vx;
          this.y += this.vy;
          this.vy += FIREWORK_GRAVITY;
          this.life--;

          this.history.push({ x: this.x, y: this.y });
          if (this.history.length > FIREWORK_TAIL_LENGTH) {
            this.history.shift();
          }
        }

        draw(ctx) {
          for (let i = 0; i < this.history.length; i++) {
            const point = this.history[i];
            const t = i / this.history.length;
            const size = this.size * t * 0.6;
            const opacity = (this.life / this.maxLife) * t * 0.5;
            ctx.beginPath();
            ctx.arc(point.x, point.y, size, 0, Math.PI * 2);
            ctx.fillStyle = `hsla(${this.hue}, 100%, 60%, ${opacity})`;
            ctx.fill();
          }

          const opacity = this.life / this.maxLife;
          ctx.beginPath();
          ctx.arc(this.x, this.y, this.size * opacity, 0, Math.PI * 2);
          ctx.fillStyle = `hsla(${this.hue}, 100%, 60%, ${opacity})`;
          ctx.fill();
        }
      }

      class Firework {
        constructor(x, y) {
          this.x = x;
          this.y = y;
          this.vx = (Math.random() - 0.5) * 1.5;
          this.vy = -FIREWORK_SPEED - Math.random() * 3;
          this.hue = Math.random() * 360;
          this.exploded = false;
          this.particles = [];
        }

        update() {
          if (!this.exploded) {
            this.x += this.vx;
            this.y += this.vy;
            this.vy += FIREWORK_GRAVITY * 0.3;

            if (this.vy >= 0 || this.y < height * (0.2 + Math.random() * 0.3)) {
              this.explode();
            }
          } else {
            for (let i = this.particles.length - 1; i >= 0; i--) {
              this.particles[i].update();
              if (this.particles[i].life <= 0) {
                this.particles.splice(i, 1);
              }
            }
          }
        }

        explode() {
          this.exploded = true;
          for (let i = 0; i < PARTICLE_COUNT; i++) {
            const angle = Math.random() * Math.PI * 2;
            const speed = Math.random() * 4 + 2;
            const vx = Math.cos(angle) * speed;
            const vy = Math.sin(angle) * speed;
            const size = Math.random() * 4 + 2;
            const life = Math.floor(Math.random() * 70 + 60);
            const hue = (this.hue + (Math.random() - 0.5) * 40 + 360) % 360;
            this.particles.push(new FireworkParticle(this.x, this.y, vx, vy, hue, size, life));
          }
        }

        draw(ctx) {
          if (!this.exploded) {
            ctx.beginPath();
            ctx.arc(this.x, this.y, 4, 0, Math.PI * 2);
            ctx.fillStyle = `hsl(${this.hue}, 100%, 60%)`;
            ctx.fill();
          } else {
            this.particles.forEach(p => p.draw(ctx));
          }
        }

        isDead() {
          return this.exploded && this.particles.length === 0;
        }
      }

      // ---------- 烟花管理函数 ----------
      function startFireworks() {
        if (fireworksStarted) return;
        fireworksStarted = true;

        for (let i = 0; i < 5; i++) {
          setTimeout(() => {
            const x = Math.random() * width;
            const y = height - 10;
            fireworks.push(new Firework(x, y));
          }, i * 150);
        }

        fireworkTimer = setInterval(() => {
          const x = Math.random() * width;
          const y = height - 10;
          fireworks.push(new Firework(x, y));
        }, FIREWORK_INTERVAL);
      }

      function updateFireworks() {
        for (let i = fireworks.length - 1; i >= 0; i--) {
          fireworks[i].update();
          if (fireworks[i].isDead()) {
            fireworks.splice(i, 1);
          }
        }
      }

      function drawFireworks() {
        fireworkCtx.clearRect(0, 0, width, height);
        fireworks.forEach(f => f.draw(fireworkCtx));
      }

      // ---------- 拼字粒子逻辑 ----------
      function initParticlesForCurrentLine() {
        particles = [];
        for (let i = 0; i < currentLinePoints.length; i++) {
          const x = Math.random() * width;
          const y = Math.random() * height;
          particles.push(new Particle(x, y, 0, 0));
        }
        assignTargetsToParticles();
      }

      function assignTargetsToParticles() {
        if (particles.length !== currentLinePoints.length) {
          const newParticles = [];
          for (let i = 0; i < currentLinePoints.length; i++) {
            if (i < particles.length) {
              let p = particles[i];
              p.history = [];
              p.x = Math.random() * width;
              p.y = Math.random() * height;
              newParticles.push(p);
            } else {
              newParticles.push(new Particle(Math.random() * width, Math.random() * height, 0, 0));
            }
          }
          particles = newParticles;
        }

        const shuffled = [...currentLinePoints];
        for (let i = shuffled.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
        }
        particles.forEach((p, idx) => {
          p.targetX = shuffled[idx].x;
          p.targetY = shuffled[idx].y;
        });
      }

      function checkAllParticlesArrived() {
        if (!isMoving || particles.length === 0) return false;
        for (let p of particles) {
          const dx = p.targetX - p.x;
          const dy = p.targetY - p.y;
          if (Math.sqrt(dx * dx + dy * dy) > MOVE_THRESHOLD) {
            return false;
          }
        }
        return true;
      }

      function goToNextLine() {
        particles = [];
        currentLineIndex++;

        if (currentLineIndex < TEXT_LINES.length) {
          currentLinePoints = generatePointsForLine(TEXT_LINES[currentLineIndex], targetParticleCount);
          initParticlesForCurrentLine();
          isMoving = true;
        } else {
          isMoving = false;
          startFireworks();
        }
      }

      // ---------- 动画循环 ----------
      function animate() {
        particleCtx.clearRect(0, 0, width, height);

        if (isMoving) {
          particles.forEach(p => p.update());
          particles.forEach(p => p.draw());

          if (checkAllParticlesArrived()) {
            if (!allParticlesArrived) {
              allParticlesArrived = true;
              isMoving = false;

              if (lineCompleteTimer) clearTimeout(lineCompleteTimer);
              lineCompleteTimer = setTimeout(() => {
                goToNextLine();
                allParticlesArrived = false;
              }, LINE_COMPLETE_DELAY);
            }
          }
        }

        if (fireworksStarted) {
          updateFireworks();
          drawFireworks();
        } else {
          fireworkCtx.clearRect(0, 0, width, height);
        }

        animationFrame = requestAnimationFrame(animate);
      }

      // ---------- 启动流程 ----------
      function startPresentation() {
        if (isMoving) return;

        startBtn.classList.add('hidden');
        music.play().catch(e => console.log('音乐播放失败，请检查音乐文件。'));

        currentLineIndex = 0;
        allParticlesArrived = false;
        if (lineCompleteTimer) clearTimeout(lineCompleteTimer);

        targetParticleCount = calcTargetParticleCount();

        currentLinePoints = generatePointsForLine(TEXT_LINES[0], targetParticleCount);
        initParticlesForCurrentLine();
        isMoving = true;

        if (!animationFrame) {
          animate();
        }
      }

      startBtn.addEventListener('click', startPresentation);
      animate();
    })();
  </script>
</body>

</html>
