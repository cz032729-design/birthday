<!DOCTYPE html>
<html lang="zh">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,viewport-fit=cover">

<title>生日快乐 🎂</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

background:radial-gradient(circle at bottom,#0a0a2a,#000);

overflow:hidden;

font-family:
"PingFang SC",
"Hiragino Sans GB",
"Microsoft YaHei",
sans-serif;

}

/* canvas */

canvas{

position:fixed;
top:0;
left:0;
width:100%;
height:100%;

}

/* start button */

#startBtn{

position:absolute;
top:50%;
left:50%;

transform:translate(-50%,-50%);

padding:18px 40px;

font-size:26px;

color:white;

border-radius:60px;

border:2px solid rgba(255,255,255,0.6);

background:rgba(255,255,255,0.12);

backdrop-filter:blur(8px);

box-shadow:0 0 30px rgba(255,255,255,0.3);

cursor:pointer;

transition:0.3s;

}

#startBtn:hover{

transform:translate(-50%,-50%) scale(1.1);

}

/* message */

#message{

position:absolute;

bottom:18%;

width:100%;

text-align:center;

color:white;

font-size:28px;

letter-spacing:3px;

text-shadow:0 0 15px white;

}

/* cake */

#cake{

position:absolute;

bottom:5%;

left:50%;

transform:translateX(-50%);

font-size:70px;

opacity:0;

transition:2s;

}

</style>

</head>

<body>

<canvas id="stars"></canvas>
<canvas id="fireworks"></canvas>
<canvas id="hearts"></canvas>

<div id="message"></div>

<div id="cake">🎂</div>

<button id="startBtn">✨ 点击开启生日惊喜 ✨</button>

<audio id="music" loop preload="auto" playsinline webkit-playsinline>
<source src="wangl.mp3" type="audio/mpeg">
</audio>

<script>

/* 祝福文字 */

const lines=[

"生日快乐 何敏",

"四川第一温柔美少女",

"愿你所有愿望都实现",

"愿你未来闪闪发光",

"愿所有幸运都围绕你",

"希望未来每一天都快乐"

]

/* canvas */

const starCanvas=document.getElementById("stars")
const fireCanvas=document.getElementById("fireworks")
const heartCanvas=document.getElementById("hearts")

const starCtx=starCanvas.getContext("2d")
const fireCtx=fireCanvas.getContext("2d")
const heartCtx=heartCanvas.getContext("2d")

const btn=document.getElementById("startBtn")
const message=document.getElementById("message")
const cake=document.getElementById("cake")
const music=document.getElementById("music")

let w,h,dpr

function resize(){

dpr=window.devicePixelRatio||1

w=window.innerWidth
h=window.innerHeight

;[starCanvas,fireCanvas,heartCanvas].forEach(c=>{

c.width=w*dpr
c.height=h*dpr

})

starCtx.setTransform(dpr,0,0,dpr,0,0)
fireCtx.setTransform(dpr,0,0,dpr,0,0)
heartCtx.setTransform(dpr,0,0,dpr,0,0)

}

resize()

/* 星星 */

let stars=[]

for(let i=0;i<160;i++){

stars.push({

x:Math.random()*w,
y:Math.random()*h,

size:Math.random()*2,
speed:Math.random()*0.4

})

}

/* 流星 */

let meteors=[]

function spawnMeteor(){

meteors.push({

x:Math.random()*w,

y:-50,

vx:-4,

vy:6,

life:100

})

}

setInterval(spawnMeteor,3500)

/* 烟花 */

let fireworks=[]

class Firework{

constructor(x){

this.x=x
this.y=h

this.vy=-7-Math.random()*2

this.hue=Math.random()*360

this.exploded=false

this.particles=[]

}

update(){

if(!this.exploded){

this.y+=this.vy

this.vy+=0.05

if(this.vy>=0){

this.explode()

}

}else{

this.particles.forEach(p=>{

p.x+=p.vx
p.y+=p.vy

p.vy+=0.05

p.life--

})

this.particles=this.particles.filter(p=>p.life>0)

}

}

explode(){

this.exploded=true

for(let i=0;i<90;i++){

const a=Math.random()*Math.PI*2

const s=Math.random()*4

this.particles.push({

x:this.x,
y:this.y,

vx:Math.cos(a)*s,
vy:Math.sin(a)*s,

life:80

})

}

}

draw(){

if(!this.exploded){

fireCtx.beginPath()
fireCtx.arc(this.x,this.y,3,0,Math.PI*2)
fireCtx.fillStyle=`hsl(${this.hue},100%,60%)`
fireCtx.fill()

}else{

this.particles.forEach(p=>{

fireCtx.beginPath()
fireCtx.arc(p.x,p.y,2,0,Math.PI*2)
fireCtx.fillStyle=`hsl(${this.hue},100%,60%)`
fireCtx.fill()

})

}

}

}

/* 爱心粒子 */

let hearts=[]

function spawnHeart(){

hearts.push({

x:Math.random()*w,

y:h+20,

vy:-2-Math.random()*2,

size:20+Math.random()*20,

life:200

})

}

setInterval(spawnHeart,800)

/* 打字机 */

let lineIndex=0
let charIndex=0

function typeWriter(){

if(lineIndex>=lines.length){

cake.style.opacity=1

return

}

let text=lines[lineIndex]

message.innerHTML=text.slice(0,charIndex)

charIndex++

if(charIndex>text.length){

lineIndex++

charIndex=0

setTimeout(typeWriter,1500)

}else{

setTimeout(typeWriter,80)

}

}

/* 动画 */

function animate(){

starCtx.clearRect(0,0,w,h)

stars.forEach(s=>{

s.y+=s.speed

if(s.y>h)s.y=0

starCtx.beginPath()

starCtx.arc(s.x,s.y,s.size,0,Math.PI*2)

starCtx.fillStyle="white"

starCtx.fill()

})

meteors.forEach(m=>{

m.x+=m.vx

m.y+=m.vy

m.life--

starCtx.beginPath()

starCtx.arc(m.x,m.y,2,0,Math.PI*2)

starCtx.fillStyle="white"

starCtx.fill()

})

meteors=meteors.filter(m=>m.life>0)

/* hearts */

heartCtx.clearRect(0,0,w,h)

hearts.forEach(hh=>{

hh.y+=hh.vy

hh.life--

heartCtx.font=hh.size+"px serif"

heartCtx.fillText("💖",hh.x,hh.y)

})

hearts=hearts.filter(hh=>hh.life>0)

/* fireworks */

fireCtx.clearRect(0,0,w,h)

fireworks.forEach(f=>{

f.update()

f.draw()

})

requestAnimationFrame(animate)

}

animate()

/* start */

function start(){

btn.style.display="none"

/* iPhone音乐兼容 */

music.muted=true

music.play()

setTimeout(()=>{

music.muted=false

},200)

typeWriter()

/* 烟花循环 */

setInterval(()=>{

fireworks.push(new Firework(Math.random()*w))

},800)

}

btn.addEventListener("click",start)

</script>

</body>

</html>
